<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  .logo {
    font-size: 72px;
    color: #c0c0c0;
    letter-spacing: 8px;
    margin-bottom: 12px;
  }
  .bar {
    width: 300px;
    height: 3px;
    background: #6b8f3c;
    margin: 0 auto 20px;
  }
  .tagline {
    font-size: 22px;
    color: #888;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo"># ---- #</div>
    <div class="bar"></div>
    <div class="tagline">syntax fitness</div>
  </div>
</body>
</html>
